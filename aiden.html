<!DOCTYPE html>
<html>
<head>
  <title>Aiden</title>
  <link rel="icon" type="image/png" href="assets/images/aiden_icon.png">
  <link rel="stylesheet" href="css/character.css">
  <link rel="stylesheet" href="css/aiden.css">
</head>
<body>

<audio id="bg-music" autoplay loop>
  <source src="assets/music/music_aiden.mp3" type="audio/mpeg">
</audio>

<img src="assets/images/backgrounds/bg_aiden.jpg" class="full-cover-image">
<img src="assets/images/backgrounds/bg_aiden.jpg" class="full-cover-image-blur">
<div class="white-overlay"></div>

<div class="center-box">
  <div class="glass-box">
      <h1>Aiden</h1>
  </div>  
</div>

<div class="center-box2">
    <div class="spell-info" id="spellDetails"></div>
</div>

<div class="center-box">
  <a href="index.html">
    <img src="assets/images/aiden_icon.png" class="char_head">
  </a>
  <div class="ref-options">
    <button class="openButton" id="openSpells"><p>Spells</p></button>
    <button class="openButton" id="openButton2"><p>Features</p></button>
  </div>
</div>

<div id="overlay"></div>

<div id="bottomPanel">
    <div class="center-box3">
        <button id="closePanel" class="close-btn">
            <svg class="caret" width="24" height="24" viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6" fill="none" stroke="white" stroke-width="2"/>
            </svg>
        </button>
        <div id="bottomPanelList" class="panel-content">

        </div>
    </div>
</div>

<script>
  const panel = document.getElementById("bottomPanel");
  const overlay = document.getElementById("overlay");
  const panel_list = document.getElementById("bottomPanelList");
  const spellDetails = document.getElementById("spellDetails");

  document.getElementById("openSpells").onclick = () => {
    panel.classList.add("open");
    overlay.classList.add("active");
    panel_list.innerHTML = `
      <h1>Spells</h1>
    `;
    const spellList = document.createElement("div");
    spellList.className = "spell-ref-bot";
    panel_list.appendChild(spellList);
    getSpellList(spellList)
  };

  document.getElementById("openButton2").onclick = () => {
    panel.classList.add("open");
    overlay.classList.add("active");
    panel_list.innerHTML = `
      <h1>Features</h1>
    `;
    const featList = document.createElement("div");
    featList.className = "spell-ref-bot";
    panel_list.appendChild(featList);
    getFeatList(featList)    
  };

  document.getElementById("closePanel").onclick = closePanel;

  overlay.onclick = closePanel;

  function closePanel() {
    panel.classList.remove("open");
    overlay.classList.remove("active");
  }

  function getSpellList(spellList) {
    fetch("assets/spell_lists/aiden.json")
      .then(response => response.json())
      .then(spells => {
          buildSidebar(spells,spellList);
      })
      .catch(err => {
          console.error("Error loading spells.json:", err);
      });
  }

  function buildSidebar(spells,spellList) {
    if (spells.length === 0) {
        spellList.innerHTML = "<div>No spells found.</div>";
        return;
    }

    const grouped = {};
    spells.forEach(spell => {
        if (!grouped[spell.Level]) grouped[spell.Level] = [];
        grouped[spell.Level].push(spell);
    });

    for (const Level in grouped) {
      const divider = document.createElement("div");
      divider.className = "divider";
      divider.textContent = Number(Level) === 0 ? "Cantrip": `Level ${Level}`;
      spellList.appendChild(divider);

      grouped[Level].forEach(spell => {
        const div = document.createElement("div");
        div.className = "spell";
        div.textContent = spell.SpellName;
        div.onclick = () => {
          showDetails(spell);
          panel.classList.remove("open");
          overlay.classList.remove("active");
        }
        spellList.appendChild(div);
      });
    }
  }

  function showDetails(spell) {
      const levelDesc = Number(spell.Level) === 0 ? "Cantrip": `Level ${spell.Level}`;
      const highLevel = (spell.HigherLevels !== null && spell.HigherLevels !== undefined && spell.HigherLevels !== "") 
      ? `
        <br/>
        <p><b>At Higher Levels. </b>${spell.HigherLevels}</p>
      ` 
      : ""; 
      const comps = [];
      if (spell.VerbalComp) comps.push("Verbal");
      if (spell.SomaticComp) comps.push("Somatic");
      if (spell.MaterialComp && spell.MaterialCompDesc !== null) comps.push(`Material (${spell.MaterialCompDesc})`);
      if (spell.MaterialComp && spell.MaterialCompDesc === null) comps.push("Material");
      const compString = comps.join(", ") || "None";

      spellDetails.innerHTML = `
        <h2>${spell.SpellName}</h2>
        <h3>${spell.School} (${levelDesc})</h3>
        <div class="info">
          <p><strong>Casting Time: </strong>${spell.CastingTime}</p>
          <p><strong>Range: </strong>${spell.Range}</p>
          <p><strong>Components: </strong> ${compString}</p>
          <p><strong>Duration: </strong>${spell.Duration}</p>
        </div>
        <div class="spell-desc">
          <p>${spell.Descrip}</p>
          <p>${highLevel}</p>
        </div>
        <div class="center-box">
          <img src="assets/images/page_bottom.png" class="d20-divider">
        </div>
      `;
  }

  function getFeatList(featList) {
    fetch("assets/features/feats_aiden.json")
      .then(response => response.json())
      .then(feats => {
          buildFeatList(feats,featList);
      })
      .catch(err => {
          console.error("Error loading feat.json:", err);
      });
  }

  function buildFeatList(feats,featList) {
    if (feats.length === 0) {
        featList.innerHTML = "<div>No feats found.</div>";
        return;
    }

    const grouped = {};
    feats.forEach(feat => {
        if (!grouped[feat.Source]) grouped[feat.Source] = [];
        grouped[feat.Source].push(feat);
    });

    for (const Source in grouped) {
      const divider = document.createElement("div");
      divider.className = "divider";
      divider.textContent = Source;
      featList.appendChild(divider);

      grouped[Source].forEach(feat => {
        const div = document.createElement("div");
        div.className = "spell";
        div.textContent = feat.FeatName;
        div.onclick = () => {
          showFeatDetails(feat);
          panel.classList.remove("open");
          overlay.classList.remove("active");
        }
        featList.appendChild(div);
      });
    }
  }

  function showFeatDetails(feat) {
    const sourceName = feat.Source === "Class" ? "Class Ability": feat.Source === "Species" ? "Special Ability" : feat.Source;
    spellDetails.innerHTML = `
      <h2>${feat.FeatName}</h2>
      <h3>${sourceName}</h3>
      <br/>
      <div class="spell-desc">
        <p>${feat.Descrip}</p>
      </div>
      <div class="center-box">
        <img src="assets/images/page_bottom.png" class="d20-divider">
      </div>
    `;
  }


  const audio = document.getElementById('bg-music');
  audio.volume = 0.05;

</script>

</body>
</html>
